<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="Watch a live feed of Logweb logs." />
        <title>Logweb Inspector Live</title>
        <link rel="stylesheet" href="/assets/css/base.css" />
        <script src="/assets/js/common.js" defer></script>
        <script src="/assets/js/live.js" defer></script>
    </head>

    <body>
        <header class="site-header">
            <div>
                <p class="eyebrow">SQLite log viewer</p>
                <h1>Logweb Inspector</h1>
            </div>
            <div class="header-actions">
                <nav class="site-nav" aria-label="Primary">
                    <a class="nav-link active" href="/" aria-current="page"
                        >Live</a
                    >
                    <a class="nav-link" href="/logs">Logs</a>
                    <a class="nav-link" href="/query">Query</a>
                </nav>
                <span class="status">Read-only</span>
            </div>
        </header>

        <main class="container">
            <section class="control-panel" aria-labelledby="feed-title">
                <div class="section-heading">
                    <h2 id="feed-title">Live Feed</h2>
                    <p id="feed-status">Starting</p>
                </div>

                <form class="live-controls" id="feed-controls">
                    <label class="field compact-field">
                        <span>Refresh</span>
                        <span class="interval-input">
                            <input
                                id="refresh-interval"
                                type="number"
                                min="1"
                                max="60"
                                value="1"
                            />
                            <span>seconds</span>
                        </span>
                    </label>

                    <button class="button" id="refresh-now" type="button">
                        Refresh
                    </button>
                </form>
            </section>

            <section class="results-panel" aria-labelledby="logs-title">
                <div class="section-heading">
                    <h2 id="logs-title">Latest Logs</h2>
                    <p id="log-summary">Loading logs</p>
                </div>

                <p class="result-message" id="log-message">Loading logs.</p>

                <div class="table-wrap" id="log-table-wrap" hidden>
                    <table>
                        <thead>
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">Occurrence (UTC)</th>
                                <th scope="col">Level</th>
                                <th scope="col">Producer</th>
                                <th scope="col">Content</th>
                            </tr>
                        </thead>
                        <tbody id="log-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </body>
</html>
