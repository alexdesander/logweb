<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="description" content="Browse recent Logweb SQLite logs." />
        <title>Logweb Inspector Logs</title>
        <link rel="stylesheet" href="/assets/css/base.css" />
        <script src="/assets/js/common.js" defer></script>
        <script src="/assets/js/logs.js" defer></script>
    </head>

    <body>
        <header class="site-header">
            <div>
                <p class="eyebrow">SQLite log viewer</p>
                <h1>Logweb Inspector</h1>
            </div>
            <div class="header-actions">
                <nav class="site-nav" aria-label="Primary">
                    <a class="nav-link" href="/">Live</a>
                    <a
                        class="nav-link active"
                        href="/logs"
                        aria-current="page"
                        >Logs</a
                    >
                    <a class="nav-link" href="/query">Query</a>
                </nav>
                <span class="status">Read-only</span>
            </div>
        </header>

        <main class="container">
            <section class="control-panel" aria-labelledby="filters-title">
                <div class="section-heading">
                    <h2 id="filters-title">Controls</h2>
                    <p>Filter and limit the latest logs.</p>
                </div>

                <form class="filter-grid" id="log-controls">
                    <label class="field">
                        <span>Level</span>
                        <select id="level-filter">
                            <option value="">All levels</option>
                        </select>
                    </label>

                    <label class="field">
                        <span>Producer</span>
                        <select id="producer-filter">
                            <option value="">All producers</option>
                        </select>
                    </label>

                    <label class="field content-field">
                        <span>Content</span>
                        <input
                            id="content-filter"
                            type="search"
                            autocomplete="off"
                            placeholder="Search content"
                        />
                    </label>

                    <label class="field date-field">
                        <span>UTC lowest</span>
                        <input
                            id="utc-lowest-filter"
                            type="datetime-local"
                            step="1"
                        />
                    </label>

                    <label class="field date-field">
                        <span>UTC highest</span>
                        <input
                            id="utc-highest-filter"
                            type="datetime-local"
                            step="1"
                        />
                    </label>

                    <label class="field compact-field">
                        <span>Amount</span>
                        <input
                            id="limit-filter"
                            type="number"
                            min="1"
                            max="500"
                            value="50"
                        />
                    </label>

                    <div class="control-actions">
                        <button
                            class="button primary"
                            id="apply-filters"
                            type="submit"
                        >
                            Apply
                        </button>
                        <button class="button" id="reset-filters" type="button">
                            Reset
                        </button>
                    </div>
                </form>
            </section>

            <section class="results-panel" aria-labelledby="logs-title">
                <div class="section-heading">
                    <h2 id="logs-title">Latest Logs</h2>
                    <p id="log-summary">Loading logs</p>
                </div>

                <p class="result-message" id="log-message">Loading logs.</p>

                <div class="table-wrap" id="log-table-wrap" hidden>
                    <table>
                        <thead>
                            <tr>
                                <th scope="col">ID</th>
                                <th scope="col">Occurrence (UTC)</th>
                                <th scope="col">Level</th>
                                <th scope="col">Producer</th>
                                <th scope="col">Content</th>
                            </tr>
                        </thead>
                        <tbody id="log-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </body>
</html>
