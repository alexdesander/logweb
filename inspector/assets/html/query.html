<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta
            name="description"
            content="Inspect SQLite log data with SQL queries."
        />
        <title>Logweb Inspector Query</title>
        <link rel="stylesheet" href="/assets/css/base.css" />
        <script src="/assets/js/common.js" defer></script>
        <script src="/assets/js/query.js" defer></script>
    </head>

    <body>
        <header class="site-header">
            <div>
                <p class="eyebrow">SQLite log viewer</p>
                <h1>Logweb Inspector</h1>
            </div>
            <div class="header-actions">
                <nav class="site-nav" aria-label="Primary">
                    <a class="nav-link" href="/">Live</a>
                    <a class="nav-link" href="/logs">Logs</a>
                    <a class="nav-link active" href="/query" aria-current="page"
                        >Query</a
                    >
                </nav>
                <span class="status">Read-only</span>
            </div>
        </header>

        <main class="container">
            <section class="query-panel" aria-labelledby="query-title">
                <div class="section-heading">
                    <h2 id="query-title">SQL Query</h2>
                    <p>Run SQLite queries against the log database.</p>
                </div>

                <label class="query-label" for="sql-query">Query</label>
                <textarea id="sql-query" spellcheck="false">
select
    Log.id as id,
    Log.occurrence,
    Log.level,
    Log.producer,
    Log.content
from Log
order by Log.id desc
limit 100;</textarea
                >

                <div class="controls" aria-label="Inspector controls">
                    <button class="button primary" id="run-query" type="button">
                        Run
                    </button>
                    <button class="button" id="clear-query" type="button">
                        Clear
                    </button>
                    <button
                        class="button toggle"
                        id="replace-names"
                        type="button"
                        aria-pressed="true"
                    >
                        Names: On
                    </button>
                </div>
            </section>

            <section class="results-panel" aria-labelledby="results-title">
                <div class="section-heading">
                    <h2 id="results-title">Results</h2>
                    <p id="result-summary">No query run</p>
                </div>

                <p class="result-message" id="result-message">
                    Run a query to see results.
                </p>

                <div class="table-wrap" id="result-table-wrap" hidden>
                    <table id="result-table">
                        <thead id="result-head"></thead>
                        <tbody id="result-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </body>
</html>
